# Build the OptiMat Alloys Docker image from this repository and publish it
# to GitHub Container Registry (ghcr.io/optimat-chat/optimat-alloys).
#
# Triggers:
#   - push of a version tag (v1.0.0, v1.1.0, ...) — publishes semver tags + latest
#   - manual workflow_dispatch — publishes a sha-tagged validation image
#
# The image is large (~15-25 GB uncompressed: CUDA runtime + two conda envs),
# so the job first reclaims ~30 GB of disk on the runner and pushes directly
# to the registry without keeping a local tarball or build cache.

name: docker-publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/optimat-chat/optimat-alloys

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
        # `latest` is added automatically for semver tag pushes only.

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Non-blocking sanity check: pull the freshly published image on a clean
  # runner and verify the Chainlit UI answers on :8000. continue-on-error is
  # set because pulling a 20+ GB image to a second runner is slow and the
  # first-run precompute behaviour is still being characterised — failures
  # here must not block the release, only inform it.
  smoke:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      packages: read
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          docker run -d --name optimat -p 8000:8000 "$IMAGE:$TAG"

      - name: Wait for Chainlit UI
        run: |
          for i in $(seq 1 90); do
            if curl -fsS -o /dev/null http://localhost:8000; then
              echo "UI is up after ~$((i*10))s"
              exit 0
            fi
            sleep 10
          done
          echo "UI did not answer within 15 min"
          exit 1

      - name: Container logs (on failure)
        if: failure()
        run: docker logs optimat
